name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and Build
        env:
          NEXT_PUBLIC_AMAP_JS_KEY: ${{ secrets.NEXT_PUBLIC_AMAP_JS_KEY }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
        run: |
          npm ci
          npm run build

      - name: Package for deployment
        run: |
          tar -czf deploy.tar.gz \
            .next package.json package-lock.json \
            public next.config.ts tsconfig.json \
            src .env.example

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/CheckinWhere
            echo "AMAP_KEY=${{ secrets.AMAP_KEY }}" > .env
            echo "NEXT_PUBLIC_AMAP_JS_KEY=${{ secrets.NEXT_PUBLIC_AMAP_JS_KEY }}" >> .env
            tar -xzf /tmp/deploy.tar.gz
            pm2 restart CheckinWhere || pm2 start 'node .next/standalone/server.js' --name CheckinWhere
            pm2 save
            rm -f /tmp/deploy.tar.gz
            echo "Deploy done at $(date)"
